<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEARNE - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="body-login">

    <header>
        <h1 class="logo">CINEARNE</h1>
        <div class="right-area">
            <a href="home.html" class="nav-icon"><i class="fa-solid fa-house"></i></a>
        </div>
    </header>

    <main class="main-login">
        <div class="card-login">
            <h2>ENTRAR</h2>
            <p>Acesse sua conta para continuar</p>
            
            <form action="index.html" method="GET">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="user" placeholder="Nome de usuário" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Sua senha" required>
                </div>

                <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>

            <div class="footer-login">
                <span>Não tem conta? <a href="#">Cadastre-se</a></span>
            </div>
        </div>
    </main>

</body>
</html>
